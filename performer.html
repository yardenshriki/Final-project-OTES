<!DOCTYPE html>
<html>

<head>
    <title>Performer - Online Tasks Execution System</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <div id="page">
        <div id="menuOverlay" onclick="closeMenu()"></div>

        <div id="sideMenu">
            <div class="menuHeader">
                <h3>Menu</h3>
                <button type="button" class="closeMenuButton" onclick="closeMenu()" aria-label="Close menu">Ş</button>
            </div>
            <button type="button" class="sideMenuItem homeIcon" onclick="openHomeByRole()"><span class="menuIcon"></span>Home Page</button>
            <button type="button" class="sideMenuItem tasksIcon"><span class="menuIcon"></span>My Tasks</button>
            <button type="button" class="sideMenuItem profileMenuIcon"><span class="menuIcon"></span>Edit Profile</button>
            <button type="button" class="sideMenuItem reportIcon"><span class="menuIcon"></span>Report</button>
            <button type="button" class="sideMenuItem policyIcon"><span class="menuIcon"></span>Company Policy</button>
            <button type="button" class="sideMenuItem exitIcon" onclick="window.location.href='index.html'"><span class="menuIcon"></span>Exit</button>
        </div>

        <div id="appHeader">
            <input type="button" value="&#9776;" class="menuButton" onclick="openMenu()">
            <span class="systemTitle">Online Task Execution System</span>

            <button type="button" class="profileButton" aria-label="Profile">
                <span class="profileIcon"></span>
            </button>
            <div class="roleSwitch">
                <input type="button" id="requesterButton" value="Requester" onclick="switchRole('Requester')">
                <input type="button" id="performerButton" value="Performer" onclick="switchRole('Performer')">
            </div>

        </div>

<div id="performerHomeScreen" class="screen">
            <div class="topBar">
                <span>Online Task Execution System</span>                <input type="button" value="Menu" onclick="openMenu()">
                <input type="button" value="Requester" onclick="showScreen('requesterHomeScreen')">
                <input type="button" value="Home" onclick="showScreen('performerHomeScreen')">
                <input type="button" value="My Tasks" onclick="showScreen('myTasksScreen')">
                <input type="button" value="Profile" onclick="showScreen('profileScreen')">
                <input type="button" value="Report" onclick="showScreen('reportScreen')">
                <input type="button" value="Policy" onclick="showScreen('policyScreen')">
                <input type="button" value="Logout" onclick="showScreen('loginScreen')">
            </div>

            <div class="systemBox">
                <h3>My Active Tasks</h3>
                <div class="taskList" id="performerActiveTasks">
                </div>

                <h3>Available Tasks</h3>
                <div class="performerLayout">
                    <div class="availableList">
                        <div class="performerFilterBar">
                            <div class="performerSearchBox">
                                <span class="searchIcon"></span>
                                <input type="text" id="performerSearchInput" placeholder="Search available tasks...">
                            </div>
                            <button type="button" id="sortDateButton" class="sortDateButton" title="Newest tasks first">&#8593;</button>
                            <button type="button" class="performerFilterButton">
                                <span class="filterIcon"></span>
                                Filter
                            </button>
                        </div>

                        <div id="performerAvailableTasks">
                        </div>
                    </div>

                </div>
            </div>
        </div>

<div id="profileScreen" class="screen">
            <div class="topBar">
                <span>Task Execution System</span>                <input type="button" value="Menu" onclick="openMenu()">
                <input type="button" value="Requester" onclick="showScreen('requesterHomeScreen')">
                <input type="button" value="Performer" onclick="showScreen('performerHomeScreen')">
                <input type="button" value="My Tasks" onclick="showScreen('myTasksScreen')">
                <input type="button" value="Policy" onclick="showScreen('policyScreen')">
            </div>

        </div>
        <footer class="appFooter">
            <h2>Contact Us</h2>
            <p>If you have any questions about our policies, please contact us:</p>
            <p>Email: <span>support@taskexecution.com</span></p>
            <p class="lastUpdated">Last updated: February 2, 2026</p>
            <div class="footerSocials">
                <button type="button" aria-label="Facebook" data-tooltip="Facebook">f</button>
                <button type="button" aria-label="Twitter" data-tooltip="Twitter">t</button>
                <button type="button" aria-label="Instagram" data-tooltip="Instagram">?</button>
            </div>
        </footer>

    <script src="js/tasks-storage.js"></script>
