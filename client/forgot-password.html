<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password - Online Tasks Execution System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
</head>

<body class="authBody">
    <div id="page">
        <div id="forgotPasswordScreen" class="screen">
            <input type="button" value="? Back" class="backButton" onclick="window.location.href='index.html'">

            <h2>Forgot Password</h2>
            <p class="subTitle">In order to log back into the system and set a new password, you must verify the user's data.</p>

            <form class="card wideCard" id="forgotVerifyForm" onsubmit="return verifyForgotPasswordUser()">
                <label>Full Name</label>
                <input type="text" id="forgotFullName" placeholder="Enter your full name">
                <p id="forgotFullNameError" class="fieldError"></p>

                <label>ID Number</label>
                <input type="text" id="forgotIdNumber" placeholder="Enter your ID number">
                <p id="forgotIdNumberError" class="fieldError"></p>

                <label>Email</label>
                <input type="text" id="forgotEmail" placeholder="Enter your email">
                <p id="forgotEmailError" class="fieldError"></p>

                <label>Birth Date</label>
                <input type="date" id="forgotBirthDate">
                <p id="forgotBirthDateError" class="fieldError"></p>

                <p id="forgotVerifyMessage" class="message"></p>

                <input type="submit" value="Verify Details" class="button mainButton">
            </form>

            <form class="card wideCard forgotHidden" id="forgotResetForm" onsubmit="return resetForgotPassword()">
                <label>New Password</label>
                <input type="password" id="forgotNewPassword" placeholder="Enter new password">
                <p class="passwordHint">Password must contain letters and numbers and be at least 6 characters long.</p>
                <p id="forgotNewPasswordError" class="fieldError"></p>

                <label>Confirm New Password</label>
                <input type="password" id="forgotConfirmPassword" placeholder="Confirm new password">
                <p id="forgotConfirmPasswordError" class="fieldError"></p>

                <p id="forgotResetMessage" class="message"></p>

                <input type="submit" value="Update Password" class="button mainButton">
            </form>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/script.js"></script>
    <script src="js/login.js"></script>
    <script src="js/forgot-password.js"></script>
</body>

</html>
