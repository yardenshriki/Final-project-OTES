<!DOCTYPE html>
<html>

<head>
    <title>Sign Up - Online Tasks Execution System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
</head>

<body class="authBody">
    <div id="page">
<div id="signupScreen" class="screen">
    <input type="button" value="? Back" class="backButton" onclick="window.location.href='index.html'">

            <h2>Sign Up</h2>
            <p class="subTitle">Create your account</p>

            <form class="card wideCard" onsubmit="return checkSignup()">
   <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
                <p id="fullNameError" class="fieldError"></p>

                <label>Birth Date</label>
                <input type="date" id="birthDate">
                <p id="birthDateError" class="fieldError"></p>

                <label>ID Number</label>
                <input type="text" id="idNumber" placeholder="Enter your ID number" maxlength="9">
                <p id="idNumberError" class="fieldError"></p>

                <label>Gender</label>
                <select id="gender">
                    <option value="">Select gender</option>
                    <option value="Female">Female</option>
                    <option value="Male">Male</option>
                    <option value="Other">Other</option>
                </select>
                <p id="genderError" class="fieldError"></p>

                <label>Email</label>
                <input type="text" id="email" placeholder="Enter your email">
                <p id="emailError" class="fieldError"></p>

                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Enter your password">
                <p class="passwordHint">Password must contain letters and numbers and be at least 6 characters long.</p>
                <p id="signupPasswordError" class="fieldError"></p>

                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
                <p id="confirmPasswordError" class="fieldError"></p>

                <label>Profile Picture</label>
                <input type="file" id="profilePicture" accept="image/*">
                <p id="profilePictureError" class="fieldError"></p>

                <p id="signupMessage" class="message"></p>

                <input type="submit" value="Continue" class="button mainButton">
            </form>
        </div>

<div id="paymentScreen" class="screen">
            <input type="button" value="? Back" class="backButton" onclick="showScreen('signupScreen')">

            <h2>Payment Information</h2>
            <p class="subTitle">Enter your credit card details</p>

            <form class="card wideCard" onsubmit="return checkPayment()">
  <label>Card Holder Name</label>
                <input type="text" id="cardHolder" placeholder="Name on card">
                <p id="cardHolderError" class="fieldError"></p>

                <label>Card Number</label>
                <input type="text" id="cardNumber" placeholder="1234567890123456" maxlength="16">
                <p id="cardNumberError" class="fieldError"></p>

                <label>Expiry Date</label>
                <div class="expiryRow">
                    <div class="expiryBox">
                        <select id="expiryMonth">
                            <option value="">Choose Month</option>
                        </select>
                        <p id="expiryMonthError" class="fieldError"></p>
                    </div>

                    <div class="expiryBox expiryBoxRight">
                        <select id="expiryYear" onchange="fillExpiryMonths()">
                            <option value="">Choose Year</option>
                        </select>
                        <p id="expiryYearError" class="fieldError"></p>
                    </div>
                </div>

                <label>CVV</label>
                <input type="password" id="cvv" placeholder="123" maxlength="3">
                <p id="cvvError" class="fieldError"></p>

                <h3>Permissions &amp; Terms</h3>
                <label class="checkLine">
                    <input type="checkbox" id="receipts">
                    I agree to receive receipts via email and phone
                </label>

                <label class="checkLine">
                    <input type="checkbox" id="notifications">
                    I agree to receive notifications from the application via email and phone
                </label>

                <hr>

                <label class="checkLine">
                    <input type="checkbox" id="policy">
                    I acknowledge that OTES acts solely as a platform connecting users and is not liable for the execution or quality of the tasks.
                </label>

                <p id="paymentMessage" class="message"></p>

                <input type="submit" value="Complete Registration" class="button mainButton">
            </form>
        </div>

<div id="successScreen" class="screen">
            <div class="card successCard">
                <h2>Registration Completed</h2>
                <p>Your account was created successfully.</p>
                <input type="button" value="Continue" class="button mainButton" onclick="openHomeByRole()">
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/credit-card.js"></script>
    <script src="js/profile-picture.js"></script>
    <script src="js/signup.js"></script>
</body>

</html>
